<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda de materiales de construccion</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #5a656a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #logout-btn {
      background-color: #e74c3c;
    }

    #login-btn {
      background-color: #2ecc71;
    }

    .productos {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .producto {
      background-color: #34495e;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      width: 200px;
    }

    form {
      margin-top: 30px;
    }

    input, select, textarea {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      width: 80%;
    }

    #pedido-section {
      display: none;
    }

    .pedido-item {
      margin: 5px;
    }
  </style>
</head>
<body>
  <h1>Tienda de materiales de construccion</h1>

  <div id="user-info"></div>

  <button id="login-btn">Iniciar sesión</button>
  <button id="logout-btn" style="display: none;">Cerrar sesión</button>

  <!-- Catálogo -->
  <div id="catalogo" class="productos" style="display: none;">
    <div class="producto">
      <h3>ladrillo</h3>
      <p>$400</p>
      <label><input type="number" min="0" value="0" data-producto="ladrillo" data-precio="400" class="pedido-item" /> Cantidad</label>
    </div>
    <div class="producto">
      <h3>bloque</h3>
      <p>$950</p>
      <label><input type="number" min="0" value="0" data-producto="bloque" data-precio="950" class="pedido-item" /> Cantidad</label>
    </div>
    <div class="producto">
      <h3>adoquin</h3>
      <p>$650</p>
      <label><input type="number" min="0" value="0" data-producto="adoquin" data-precio="650" class="pedido-item" /> Cantidad</label>
    </div>
  </div>

  <!-- Formulario de pedido -->
  <div id="pedido-section">
    <h2>Realizar Pedido</h2>
    <form id="pedido-form">
      <input type="text" id="nombre-cliente" placeholder="Tu nombre" required /><br />
      <textarea id="direccion" placeholder="Dirección de entrega" required></textarea><br />
      <button type="submit">Enviar Pedido</button>
    </form>
    <div id="resumen-pedido" style="margin-top: 20px;"></div>
  </div>

  <script src="https://cdn.auth0.com/js/auth0-spa-js/1.13/auth0-spa-js.production.js"></script>
  <script>
    let auth0Client;

    const config = {
      domain: "mi-licorera-auth.us.auth0.com",
      client_id: "3OvmR2j8x5KIgHICPQrk96vIV4WU1PvR"
    };

    async function initAuth() {
      auth0Client = await createAuth0Client(config);

      const isAuthenticated = await auth0Client.isAuthenticated();

      if (isAuthenticated) {
        const user = await auth0Client.getUser();
        showUser(user);
      } else {
        const query = window.location.search;
        if (query.includes("code=") && query.includes("state=")) {
          await auth0Client.handleRedirectCallback();
          window.history.replaceState({}, document.title, "/");
          const user = await auth0Client.getUser();
          showUser(user);
        }
      }
    }

    function showUser(user) {
      document.getElementById("user-info").innerHTML = `<p>Hola, ${user.name}</p>`;
      document.getElementById("login-btn").style.display = "none";
      document.getElementById("logout-btn").style.display = "inline-block";
      document.getElementById("catalogo").style.display = "flex";
      document.getElementById("pedido-section").style.display = "block";
    }

    async function login() {
      await auth0Client.loginWithRedirect({
        redirect_uri: window.location.origin
      });
    }

    async function logout() {
      auth0Client.logout({
        returnTo: window.location.origin
      });
    }

    // Manejo de formulario
    document.getElementById("pedido-form").addEventListener("submit", function (e) {
      e.preventDefault();

      const nombre = document.getElementById("nombre-cliente").value;
      const direccion = document.getElementById("direccion").value;
      const items = document.querySelectorAll(".pedido-item");
      let resumen = `<h3>Resumen del Pedido</h3><p>Cliente: ${nombre}</p><p>Dirección: ${direccion}</p><ul>`;
      let total = 0;

      items.forEach(item => {
        const cantidad = parseInt(item.value);
        const producto = item.dataset.producto;
        const precio = parseInt(item.dataset.precio);
        if (cantidad > 0) {
          resumen += `<li>${producto}: ${cantidad} unidad(es) - $${cantidad * precio}</li>`;
          total += cantidad * precio;
        }
      });

      resumen += `</ul><p><strong>Total: $${total}</strong></p>`;
      document.getElementById("resumen-pedido").innerHTML = resumen;
    });

    window.onload = () => {
      initAuth();
      document.getElementById("login-btn").addEventListener("click", login);
      document.getElementById("logout-btn").addEventListener("click", logout);
    };
  </script>
</body>
</html>
